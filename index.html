<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Canada at Cannes Lions 2026 🍁</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FAF8F5; font-family: 'Inter', system-ui, sans-serif; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pulsing { animation: pulse 1.5s infinite; }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .slide-in { animation: slideIn 0.25s ease; }
  .entry-row:hover { background: #FAF8F5 !important; }
  .pill-btn:hover { opacity: 0.85; }
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px; }
  .modal-box { background:#fff;border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3); }
  a { color: inherit; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const R = React;
const MAPLE = "#D42B2B";
const GOLD  = "#C9A84C";
const CREAM = "#FAF8F5";
const DARK  = "#111";
const MID   = "#5A5A5A";
const BORDER= "#E2DDD6";
const BLUE  = "#1A3A5C";

const SEED = [
  {id:1,  campaign:"Supernova Adaptive",       brand:"Adidas",              agency:"TBWA\\Canada",       category:"Glass: The Lion for Change", sub:"Glass",      status:"Shortlisted", link:"https://www.instagram.com/explore/tags/adidasadaptive/"},
  {id:2,  campaign:"Supernova Adaptive",       brand:"Adidas",              agency:"TBWA\\Canada",       category:"Innovation Lions",           sub:"Innovation", status:"Shortlisted", link:"https://www.instagram.com/explore/tags/adidasadaptive/"},
  {id:3,  campaign:"Sport Inclusion Campaign", brand:"Special Olympics CA", agency:"GUT Toronto",        category:"Glass: The Lion for Change", sub:"Glass",      status:"Shortlisted", link:"https://www.specialolympics.ca/"},
  {id:4,  campaign:"Klick Health Pharma Work", brand:"Pharma Client",       agency:"Klick Health",       category:"Health & Wellness",          sub:"Health",     status:"Shortlisted", link:"https://www.klickhealth.com/"},
  {id:5,  campaign:"NFA Health Campaign",      brand:"Canadian Brand",      agency:"No Fixed Address",   category:"Health & Wellness",          sub:"Health",     status:"Shortlisted", link:"https://nofixedaddress.ca/"},
  {id:6,  campaign:"Outdoor Campaign",         brand:"Canadian Client",     agency:"Rethink",            category:"Outdoor Lions",              sub:"Outdoor",    status:"Shortlisted", link:"https://rethinkca.com/"},
  {id:7,  campaign:"Courage Campaign",         brand:"Canadian Brand",      agency:"Courage",            category:"Health & Wellness",          sub:"Health",     status:"Shortlisted", link:"https://courageca.com/"},
  {id:8,  campaign:"The Undropped Kit",        brand:"ASICS",               agency:"Angry Butterfly",    category:"Film Lions",                 sub:"Film",       status:"Shortlisted", link:"https://www.asics.com/ca/en-ca/"},
  {id:9,  campaign:"Heinz Outdoor",            brand:"Heinz Ketchup",       agency:"Rethink",            category:"Outdoor Lions",              sub:"Outdoor",    status:"Shortlisted", link:"https://www.heinz.ca/"},
  {id:10, campaign:"Infinite Saree",           brand:"Red Dot Foundation",  agency:"Carat / UM Toronto", category:"Media Lions",                sub:"Media",      status:"Shortlisted", link:"https://www.reddotfoundation.org/"},
  {id:11, campaign:"Dentsu Creative Work",     brand:"Canadian Brand",      agency:"Dentsu Creative",    category:"Film Craft",                 sub:"Film",       status:"Shortlisted", link:"https://www.dentsu.ca/"},
  {id:12, campaign:"LG2 Design Work",          brand:"Canadian Brand",      agency:"LG2",                category:"Design Lions",               sub:"Design",     status:"Shortlisted", link:"https://www.lg2.com/"},
  {id:13, campaign:"VW Campaign",              brand:"Volkswagen",          agency:"TBWA\\Canada",       category:"Outdoor Lions",              sub:"Outdoor",    status:"Shortlisted", link:"https://www.volkswagen.ca/"},
  {id:14, campaign:"Edelman Canada PR",        brand:"Canadian Brand",      agency:"Edelman Canada",     category:"PR Lions",                   sub:"PR",         status:"Shortlisted", link:"https://www.edelman.com/"},
];

const STATUS_CFG = {
  "Shortlisted": {color:BLUE,     bg:"#EEF3F9", label:"Shortlisted"},
  "Bronze":      {color:"#8B4513",bg:"#FDF4EE", label:"🥉 Bronze"},
  "Silver":      {color:"#666",   bg:"#F5F5F5", label:"🥈 Silver"},
  "Gold":        {color:"#B8860B",bg:"#FFFBEA", label:"🥇 Gold"},
  "Grand Prix":  {color:MAPLE,    bg:"#FFF0F0", label:"🏆 Grand Prix"},
};

const CAT_ICONS = {Glass:"🔮",Innovation:"💡",Outdoor:"🌆",Health:"🏥",Film:"🎬",Media:"📡",Design:"🎨",PR:"📣",Social:"📱",Pharma:"💊",Other:"⭐"};

function Leaf({size=20,color=MAPLE}) {
  return <svg width={size} height={size} viewBox="0 0 100 100" fill={color} style={{flexShrink:0}}>
    <path d="M50 5 L55 35 L75 20 L65 45 L95 40 L75 55 L85 80 L55 65 L50 95 L45 65 L15 80 L25 55 L5 40 L35 45 L25 20 L45 35 Z"/>
  </svg>;
}

function ApiKeyModal({onClose, onSave, currentKey}) {
  const [key, setKey] = R.useState(currentKey || "");
  const [step, setStep] = R.useState(1);

  return (
    <div className="modal-overlay fade-in" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box slide-in">
        <div style={{background:DARK,padding:"18px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Leaf size={18}/>
            <div>
              <div style={{color:"#fff",fontWeight:800,fontSize:15}}>🔑 Live Refresh Setup</div>
              <div style={{color:"#888",fontSize:11,marginTop:2}}>Google Gemini API (Paid)</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#888",fontSize:20,padding:4}}>✕</button>
        </div>

        <div style={{display:"flex",borderBottom:`1px solid ${BORDER}`}}>
          {["Get Key","Enter Key"].map((s,i)=>(
            <button key={s} onClick={()=>setStep(i+1)} style={{
              flex:1,padding:"10px 6px",border:"none",background:"none",
              borderBottom:`3px solid ${step===i+1?MAPLE:"transparent"}`,
              fontSize:11,fontWeight:step===i+1?700:500,
              color:step===i+1?MAPLE:MID,
            }}>{s}</button>
          ))}
        </div>

        <div style={{padding:"20px"}}>
          {step===1 ? (
            <div>
              <div style={{fontSize:14,fontWeight:800,color:DARK,marginBottom:12}}>Get your Gemini API key (Paid)</div>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {[
                  {n:1, t:"Go to Google AI Studio", d:<>Open <strong style={{color:MAPLE}}>aistudio.google.com</strong></>, action:<a href="https://aistudio.google.com" target="_blank" style={{display:"block",marginTop:8,padding:"8px 14px",background:MAPLE,color:"#fff",borderRadius:8,fontSize:12,fontWeight:700,textDecoration:"none",textAlign:"center"}}>Open AI Studio →</a>},
                  {n:2, t:"Go to API Keys", d:<>Click <strong>Dashboard</strong> in left sidebar → <strong>API Keys</strong></>},
                  {n:3, t:"Create a NEW key", d:<>Click <strong>Create API key</strong> → Copy it</>},
                ].map(s=>(
                  <div key={s.n} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{width:26,height:26,borderRadius:"50%",background:MAPLE,color:"#fff",fontSize:12,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{s.n}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:DARK,marginBottom:3}}>{s.t}</div>
                      <div style={{fontSize:12,color:MID,lineHeight:1.6}}>{s.d}</div>
                      {s.action}
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={()=>setStep(2)} style={{width:"100%",marginTop:20,padding:"10px",background:MAPLE,color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700}}>
                I have my key → Next
              </button>
            </div>
          ) : (
            <div>
              <div style={{fontSize:14,fontWeight:800,color:DARK,marginBottom:8}}>Paste your Gemini API key</div>
              <div style={{fontSize:12,color:MID,marginBottom:14,lineHeight:1.6}}>
                Starts with <strong>AIzaSy...</strong>
              </div>
              <input
                value={key}
                onChange={e=>setKey(e.target.value)}
                placeholder="AIzaSy..."
                style={{width:"100%",padding:"10px 14px",border:`2px solid ${key.startsWith("AI")?"#2d5a2d":BORDER}`,borderRadius:8,fontSize:13,outline:"none",marginBottom:10,fontFamily:"monospace"}}
              />
              {key.startsWith("AI") && (
                <div style={{fontSize:11,color:"#2d5a2d",marginBottom:10}}>✅ Key format looks good</div>
              )}
              <div style={{fontSize:11,color:MID,marginBottom:14,padding:"10px 12px",background:"#f9f9f9",borderRadius:8,lineHeight:1.6}}>
                🔒 Stored in browser only. Only sent to Google's API.
              </div>
              <button
                onClick={()=>{ if(key.length>10){ onSave(key); }}}
                disabled={key.length<10}
                style={{width:"100%",padding:"10px",background:key.length>10?MAPLE:"#ccc",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700}}
              >
                ✅ Save & Test Refresh
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [entries, setEntries]           = R.useState(SEED);
  const [loading, setLoading]           = R.useState(false);
  const [lastUpdated, setLastUpdated]   = R.useState(null);
  const [statusFilter, setStatusFilter] = R.useState("All");
  const [catFilter, setCatFilter]       = R.useState("All");
  const [searchText, setSearchText]     = R.useState("");
  const [aiSummary, setAiSummary]       = R.useState("");
  const [summaryLoading, setSummaryLoading] = R.useState(false);
  const [showModal, setShowModal]       = R.useState(false);
  const [apiKey, setApiKey]             = R.useState(()=>localStorage.getItem("gemini_paid_key")||"");
  const [toast, setToast]               = R.useState("");

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""),5000); };

  const saveKey = (k) => {
    setApiKey(k);
    localStorage.setItem("gemini_paid_key", k);
    setShowModal(false);
    showToast("✅ Key saved! Testing refresh...");
    setTimeout(()=>refresh(k), 800);
  };

  const refresh = async (keyOverride) => {
    const key = keyOverride || apiKey;
    if (!key) { setShowModal(true); return; }

    setLoading(true);
    setSummaryLoading(true);
    setAiSummary("");

    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

    const ask = async (prompt) => {
      try {
        const r = await fetch(GEMINI_URL, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            contents:[{parts:[{text: prompt}]}],
            tools:[{google_search:{}}]
          })
        });
        const d = await r.json();
        if (d.error) {
          const errMsg = d.error.message || "";
          if (errMsg.includes("quota") || errMsg.includes("exceeded")) {
            throw new Error("API_QUOTA_ERROR");
          }
          throw new Error(errMsg);
        }
        return d.candidates?.[0]?.content?.parts?.[0]?.text || "";
      } catch (e) {
        throw e;
      }
    };

    try {
      const text = await ask(
        `Search the web for the very latest Canadian agency results at Cannes Lions 2026 (festival runs June 22-26 2026 in Cannes France). 
        Look for shortlists AND winners from agencies including: Rethink, TBWA Canada, GUT Toronto, Klick Health, Dentsu Creative Canada, LG2, Cossette, McCann Canada, No Fixed Address, Ogilvy Canada, Angry Butterfly, Courage, Publicis Canada, Edelman Canada, UM Toronto, Carat Canada, Tank Worldwide, Diamond.
        Return ONLY a valid JSON array. No explanation. No markdown. No backticks.
        Each object must have exactly these fields:
        {"campaign":"string","brand":"string","agency":"string","category":"string","subcategory":"one of: Glass|Innovation|Outdoor|Health|Film|Media|Design|PR|Social|Pharma|Other","status":"one of: Shortlisted|Bronze|Silver|Gold|Grand Prix","link":"url or empty string"}`
      );
      const m = text.match(/\[[\s\S]*?\]/);
      if (m) {
        const fresh = JSON.parse(m[0]).map((e,i)=>({...e,id:3000+i}));
        setEntries(prev=>{
          const keyOf = e=>`${e.campaign}|||${e.category}`;
          const map = new Map(prev.map(e=>[keyOf(e),e]));
          fresh.forEach(f=>map.set(keyOf(f),{...(map.get(keyOf(f))||{}), ...f}));
          return Array.from(map.values());
        });
        showToast(`✅ Success! Found ${fresh.length} fresh entries from Cannes`);
      } else {
        showToast("⚠️ Got results but couldn't parse JSON. Try again in a moment.");
      }
      setLastUpdated(new Date());
    } catch(e) {
      const msg = e.message || "Unknown error";
      if (msg.includes("API_QUOTA_ERROR")) {
        showToast("❌ Quota exceeded. Check your billing or try again later.");
      } else if (msg.includes("API_KEY") || msg.includes("invalid")) {
        showToast("❌ Invalid API key. Check in ⚙️ Setup.");
      } else {
        showToast("❌ " + msg.substring(0,60));
      }
    } finally { setLoading(false); }

    try {
      const s = await ask(
        `Search for the latest news on how Canada is performing at Cannes Lions 2026 (June 22-26 2026). 
        Write 2-3 punchy journalistic sentences covering Canada's overall showing, standout agencies, and any Lions won so far. 
        Be specific with agency names and campaign names. Plain text only, no markdown.`
      );
      if (s && !s.includes("exceeded") && !s.includes("quota")) {
        setAiSummary(s.replace(/\*\*/g,"").replace(/\*/g,"").trim());
      }
    } catch(e) {} finally { setSummaryLoading(false); }
  };

  const cats = ["All", ...Array.from(new Set(SEED.map(e=>e.sub)))];
  const statusFilters = ["All","Grand Prix","Gold","Silver","Bronze","Shortlisted"];

  const filtered = entries.filter(e=>{
    const ms = statusFilter==="All" || e.status===statusFilter;
    const mc = catFilter==="All" || e.sub===catFilter;
    const mt = !searchText || [e.campaign,e.brand,e.agency,e.category].some(s=>s.toLowerCase().includes(searchText.toLowerCase()));
    return ms && mc && mt;
  });

  const wins   = entries.filter(e=>["Bronze","Silver","Gold","Grand Prix"].includes(e.status)).length;
  const golds  = entries.filter(e=>["Gold","Grand Prix"].includes(e.status)).length;
  const agSet  = new Set(entries.map(e=>e.agency));
  const agCts  = {};
  entries.forEach(e=>{ agCts[e.agency]=(agCts[e.agency]||0)+1; });
  const topAg  = Object.entries(agCts).sort((a,b)=>b[1]-a[1]).slice(0,6);

  return (
    <div style={{maxWidth:680,margin:"0 auto",minHeight:"100vh"}}>

      {toast && <div className="slide-in" style={{position:"fixed",top:16,right:16,zIndex:2000,background:DARK,color:"#fff",padding:"10px 18px",borderRadius:8,fontSize:13,fontWeight:600,boxShadow:"0 4px 24px rgba(0,0,0,0.35)",maxWidth:320,lineHeight:1.5}}>{toast}</div>}

      {showModal && <ApiKeyModal onClose={()=>setShowModal(false)} onSave={saveKey} currentKey={apiKey}/>}

      <div style={{background:DARK,color:"#fff",padding:"26px 18px 22px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,right:0,bottom:0,width:160,background:"linear-gradient(135deg,transparent 40%,#D42B2B15 100%)",pointerEvents:"none"}}/>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <Leaf size={22}/>
              <span style={{fontSize:10,textTransform:"uppercase",letterSpacing:"0.14em",color:"#888",fontWeight:600}}>Canada at</span>
            </div>
            <div style={{fontSize:28,fontWeight:900,letterSpacing:"-0.02em",lineHeight:1.1,fontFamily:"Georgia,serif"}}>Cannes Lions 2026</div>
            <div style={{fontSize:11,color:"#777",marginTop:5}}>June 22–26 · Cannes, France · Live Tracker</div>
          </div>
          <button onClick={()=>setShowModal(true)} style={{
            padding:"8px 12px",
            background:apiKey?"#1a3a1a":"#2a1a1a",
            border:`1px solid ${apiKey?"#2d5a2d":"#5a2d2d"}`,
            borderRadius:8,color:apiKey?"#5aab5a":MAPLE,
            fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:6,flexShrink:0,marginTop:2,
          }}>
            {apiKey?"🟢 Ready":"🔴 Setup"} <span style={{fontSize:10,opacity:0.7}}>⚙️</span>
          </button>
        </div>

        {(aiSummary||summaryLoading) && (
          <div className="slide-in" style={{marginTop:14,padding:"11px 14px",background:"#1C1C1C",borderRadius:8,borderLeft:`3px solid ${MAPLE}`,fontSize:13,color:"#CCC",lineHeight:1.65}}>
            {summaryLoading ? <span className="pulsing" style={{color:"#555"}}>🔍 Fetching latest from Cannes...</span> : aiSummary}
          </div>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,padding:"12px 12px 0"}}>
        {[
          {v:entries.length, l:"Entries",  c:DARK},
          {v:wins,           l:"Wins 🏅",  c:GOLD},
          {v:golds,          l:"Gold+",    c:MAPLE},
          {v:agSet.size,     l:"Agencies", c:BLUE},
        ].map(s=>(
          <div key={s.l} style={{background:"#fff",border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 6px",textAlign:"center"}}>
            <div style={{fontSize:26,fontWeight:900,color:s.c,lineHeight:1,fontFamily:"Georgia,serif"}}>{s.v}</div>
            <div style={{fontSize:9,color:MID,marginTop:4,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600}}>{s.l}</div>
          </div>
        ))}
      </div>

      <div style={{padding:"10px 12px 0"}}>
        <div style={{background:"#fff",border:`1px solid ${BORDER}`,borderRadius:10,overflow:"hidden"}}>
          <div style={{padding:"9px 14px",borderBottom:`1px solid ${BORDER}`,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:MID}}>
            🏅 Agency Leaderboard
          </div>
          {topAg.map(([ag,ct],i)=>(
            <div key={ag} style={{display:"flex",alignItems:"center",padding:"8px 14px",gap:10,borderBottom:i<topAg.length-1?`1px solid ${BORDER}`:"none"}}>
              <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,background:i===0?GOLD:i===1?"#C0C0C0":i===2?"#A0522D":BORDER,color:i<3?"#fff":MID,fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
              <div style={{flex:1,fontSize:12,fontWeight:600,color:DARK}}>{ag}</div>
              <div style={{fontSize:12,fontWeight:700,color:i===0?GOLD:DARK,background:i===0?"#FFFBEA":"transparent",padding:"2px 8px",borderRadius:20}}>{ct}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"10px 12px 28px"}}>
        <div style={{background:"#fff",border:`1px solid ${BORDER}`,borderRadius:10,overflow:"hidden"}}>

          <div style={{padding:"10px 12px",borderBottom:`1px solid ${BORDER}`,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <input
              placeholder="Search campaign, agency, brand..."
              value={searchText}
              onChange={e=>setSearchText(e.target.value)}
              style={{flex:1,minWidth:120,padding:"6px 12px",border:`1px solid ${BORDER}`,borderRadius:20,fontSize:12,outline:"none",background:CREAM}}
            />
            <button
              onClick={()=>refresh()}
              disabled={loading}
              style={{padding:"6px 16px",background:loading?"#eee":MAPLE,color:loading?MID:"#fff",border:"none",borderRadius:20,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}
            >
              <span className={loading?"pulsing":""}>{loading?"Updating...":"🔄 Refresh"}</span>
            </button>
          </div>

          <div style={{padding:"7px 12px",borderBottom:`1px solid ${BORDER}`,display:"flex",gap:5,flexWrap:"wrap"}}>
            {statusFilters.map(f=>(
              <button key={f} className="pill-btn" onClick={()=>setStatusFilter(f)} style={{padding:"3px 10px",borderRadius:20,border:`1px solid ${statusFilter===f?BLUE:BORDER}`,background:statusFilter===f?BLUE:"#fff",color:statusFilter===f?"#fff":MID,fontSize:10,fontWeight:600}}>{f}</button>
            ))}
          </div>

          <div style={{padding:"7px 12px",borderBottom:`1px solid ${BORDER}`,display:"flex",gap:5,overflowX:"auto"}}>
            {cats.map(c=>(
              <button key={c} className="pill-btn" onClick={()=>setCatFilter(c)} style={{padding:"3px 10px",borderRadius:20,whiteSpace:"nowrap",border:`1px solid ${catFilter===c?MAPLE:BORDER}`,background:catFilter===c?MAPLE:"#fff",color:catFilter===c?"#fff":MID,fontSize:10,fontWeight:600}}>
                {c==="All"?c:`${CAT_ICONS[c]||"⭐"} ${c}`}
              </button>
            ))}
          </div>

          <div style={{padding:"6px 14px",fontSize:10,color:MID,borderBottom:`1px solid ${BORDER}`,fontWeight:600}}>
            Showing {filtered.length} of {entries.length} entries
          </div>

          {filtered.length===0
            ? <div style={{padding:"36px 20px",textAlign:"center",color:MID,fontSize:14}}>No entries found</div>
            : filtered.map(e=>{
              const sc = STATUS_CFG[e.status]||STATUS_CFG["Shortlisted"];
              return (
                <div key={e.id} className="entry-row" style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderBottom:`1px solid ${BORDER}`,background:"#fff",transition:"background 0.15s"}}>
                  <div style={{fontSize:18,width:24,textAlign:"center",flexShrink:0}}>{CAT_ICONS[e.sub]||"⭐"}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:DARK,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {e.link ? <a href={e.link} target="_blank" rel="noopener noreferrer" style={{color:DARK,textDecoration:"underline"}}>{e.campaign}</a> : e.campaign}
                    </div>
                    <div style={{fontSize:11,color:MID,marginTop:1}}>
                      {e.brand} · <span style={{color:BLUE}}>{e.agency}</span>
                      {e.link && <span style={{marginLeft:8}}><a href={e.link} target="_blank" rel="noopener noreferrer" style={{color:BLUE,fontSize:10,fontWeight:700}}>View →</a></span>}
                    </div>
                    <div style={{fontSize:10,color:"#bbb",marginTop:1}}>{e.category}</div>
                  </div>
                  <div style={{padding:"3px 9px",borderRadius:20,background:sc.bg,color:sc.color,fontSize:10,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>{sc.label}</div>
                </div>
              );
            })
          }

          {lastUpdated && <div style={{padding:"7px 14px",fontSize:10,color:"#bbb",borderTop:`1px solid ${BORDER}`}}>Last refreshed: {lastUpdated.toLocaleTimeString()}</div>}
        </div>
      </div>

      <div style={{padding:"0 12px 28px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:4}}>
          <Leaf size={12}/>
          <span style={{fontSize:10,color:"#bbb"}}>Canada at Cannes Lions 2026 · Powered by Google Gemini</span>
        </div>
        <div style={{fontSize:10,color:"#ccc"}}>Data: Strategy Magazine, Media in Canada, Cannes Lions official · Awards Jun 22–26</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
