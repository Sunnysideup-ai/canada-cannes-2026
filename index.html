<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Canada at Cannes Lions 2026 🍁</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FAF8F5; font-family: 'Inter', system-ui, sans-serif; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pulsing { animation: pulse 1.5s infinite; }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .slide-in { animation: slideIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .fade-in { animation: fadeIn 0.3s ease; }
  .entry-row:hover { background: #FAF8F5 !important; }
  .pill-btn:hover { opacity: 0.85; }
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px; }
  .modal-box { background:#fff;border-radius:16px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3); }
  .step-num { width:28px;height:28px;border-radius:50%;background:#D42B2B;color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  code { background:#F0F0F0;padding:2px 7px;border-radius:4px;font-size:12px;font-family:monospace;word-break:break-all; }
  .copy-btn { padding:4px 10px;background:#1A3A5C;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap; }
  .copy-btn:hover { background:#244d7a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const R = React;
const MAPLE = "#D42B2B";
const GOLD  = "#C9A84C";
const CREAM = "#FAF8F5";
const DARK  = "#111";
const MID   = "#5A5A5A";
const BORDER= "#E2DDD6";
const BLUE  = "#1A3A5C";

const SEED = [
  {id:1,  campaign:"Supernova Adaptive",       brand:"Adidas",              agency:"TBWA\\Canada",       category:"Glass: The Lion for Change", sub:"Glass",      status:"Shortlisted"},
  {id:2,  campaign:"Supernova Adaptive",       brand:"Adidas",              agency:"TBWA\\Canada",       category:"Innovation Lions",           sub:"Innovation", status:"Shortlisted"},
  {id:3,  campaign:"Sport Inclusion Campaign", brand:"Special Olympics CA", agency:"GUT Toronto",        category:"Glass: The Lion for Change", sub:"Glass",      status:"Shortlisted"},
  {id:4,  campaign:"Klick Health Pharma Work", brand:"Pharma Client",       agency:"Klick Health",       category:"Health & Wellness",          sub:"Health",     status:"Shortlisted"},
  {id:5,  campaign:"NFA Health Campaign",      brand:"Canadian Brand",      agency:"No Fixed Address",   category:"Health & Wellness",          sub:"Health",     status:"Shortlisted"},
  {id:6,  campaign:"Outdoor Campaign",         brand:"Canadian Client",     agency:"Rethink",            category:"Outdoor Lions",              sub:"Outdoor",    status:"Shortlisted"},
  {id:7,  campaign:"Courage Campaign",         brand:"Canadian Brand",      agency:"Courage",            category:"Health & Wellness",          sub:"Health",     status:"Shortlisted"},
  {id:8,  campaign:"The Undropped Kit",        brand:"ASICS",               agency:"Angry Butterfly",    category:"Film Lions",                 sub:"Film",       status:"Shortlisted"},
  {id:9,  campaign:"Heinz Outdoor",            brand:"Heinz Ketchup",       agency:"Rethink",            category:"Outdoor Lions",              sub:"Outdoor",    status:"Shortlisted"},
  {id:10, campaign:"Infinite Saree",           brand:"Red Dot Foundation",  agency:"Carat / UM Toronto", category:"Media Lions",                sub:"Media",      status:"Shortlisted"},
  {id:11, campaign:"Dentsu Creative Work",     brand:"Canadian Brand",      agency:"Dentsu Creative",    category:"Film Craft",                 sub:"Film",       status:"Shortlisted"},
  {id:12, campaign:"LG2 Design Work",          brand:"Canadian Brand",      agency:"LG2",                category:"Design Lions",               sub:"Design",     status:"Shortlisted"},
  {id:13, campaign:"VW Campaign",              brand:"Volkswagen",          agency:"TBWA\\Canada",       category:"Outdoor Lions",              sub:"Outdoor",    status:"Shortlisted"},
  {id:14, campaign:"Edelman Canada PR",        brand:"Canadian Brand",      agency:"Edelman Canada",     category:"PR Lions",                   sub:"PR",         status:"Shortlisted"},
];

const STATUS_CFG = {
  "Shortlisted": {color:BLUE,   bg:"#EEF3F9", label:"Shortlisted"},
  "Bronze":      {color:"#8B4513", bg:"#FDF4EE", label:"🥉 Bronze"},
  "Silver":      {color:"#666", bg:"#F5F5F5", label:"🥈 Silver"},
  "Gold":        {color:"#B8860B", bg:"#FFFBEA", label:"🥇 Gold"},
  "Grand Prix":  {color:MAPLE,  bg:"#FFF0F0", label:"🏆 Grand Prix"},
};

const CAT_ICONS = {Glass:"🔮",Innovation:"💡",Outdoor:"🌆",Health:"🏥",Film:"🎬",Media:"📡",Design:"🎨",PR:"📣",Social:"📱",Pharma:"💊",Other:"⭐"};

const PROXY_SERVER_CODE = `const express = require('express');
const cors = require('cors');
const app = express();
app.use(cors());
app.use(express.json());
app.post('/api/claude', async (req, res) => {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': process.env.ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-beta': 'interop-2025-03-01'
    },
    body: JSON.stringify(req.body)
  });
  const data = await response.json();
  res.json(data);
});
app.listen(process.env.PORT || 3000);`;

const PROXY_PKG = `{
  "name": "cannes-proxy",
  "version": "1.0.0",
  "scripts": { "start": "node server.js" },
  "dependencies": { "express": "*", "cors": "*" }
}`;

function Leaf({size=20,color=MAPLE}) {
  return <svg width={size} height={size} viewBox="0 0 100 100" fill={color} style={{flexShrink:0}}>
    <path d="M50 5 L55 35 L75 20 L65 45 L95 40 L75 55 L85 80 L55 65 L50 95 L45 65 L15 80 L25 55 L5 40 L35 45 L25 20 L45 35 Z"/>
  </svg>;
}

function CopyBtn({text, label="Copy"}) {
  const [copied, setCopied] = R.useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),1500); });
  };
  return <button className="copy-btn" onClick={copy}>{copied ? "✅ Copied!" : label}</button>;
}

// ── Proxy Setup Modal ────────────────────────────────────────────────────────
function ProxyModal({onClose, onSave, currentUrl}) {
  const [step, setStep] = R.useState(1);
  const [url, setUrl] = R.useState(currentUrl || "");
  const [apiKey, setApiKey] = R.useState("");

  const steps = [
    {
      title:"Create the proxy server files",
      content: (
        <div>
          <p style={{fontSize:13,color:MID,lineHeight:1.6,marginBottom:12}}>
            Create two files on your computer. First, <strong>server.js</strong>:
          </p>
          <div style={{background:"#1a1a1a",borderRadius:8,padding:12,position:"relative",marginBottom:12}}>
            <div style={{position:"absolute",top:8,right:8}}><CopyBtn text={PROXY_SERVER_CODE}/></div>
            <pre style={{fontSize:10,color:"#7ec8e3",overflowX:"auto",lineHeight:1.6,marginTop:4}}>{PROXY_SERVER_CODE}</pre>
          </div>
          <p style={{fontSize:13,color:MID,lineHeight:1.6,marginBottom:12}}>Then <strong>package.json</strong>:</p>
          <div style={{background:"#1a1a1a",borderRadius:8,padding:12,position:"relative"}}>
            <div style={{position:"absolute",top:8,right:8}}><CopyBtn text={PROXY_PKG}/></div>
            <pre style={{fontSize:10,color:"#7ec8e3",lineHeight:1.6,marginTop:4}}>{PROXY_PKG}</pre>
          </div>
        </div>
      )
    },
    {
      title:"Push to GitHub & deploy on Render",
      content: (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {[
            {n:1, t:"Create a new GitHub repo", d:<>Go to <strong>github.com</strong> → New repository → name it <code>cannes-proxy</code> → Public → Create. Upload your two files (<code>server.js</code> and <code>package.json</code>).</>},
            {n:2, t:"Sign up on Render", d:<>Go to <strong>render.com</strong> → Sign up free with your GitHub account.</>},
            {n:3, t:"Create a Web Service", d:<>Click <strong>New → Web Service</strong> → Connect your <code>cannes-proxy</code> GitHub repo → Runtime: <strong>Node</strong> → Start command: <code>node server.js</code></>},
            {n:4, t:"Add your API key", d:<>In Render, go to <strong>Environment</strong> tab → Add variable: Key = <code>ANTHROPIC_API_KEY</code>, Value = your key from <strong>console.anthropic.com</strong></>},
            {n:5, t:"Deploy!", d:<>Click <strong>Deploy Web Service</strong>. Render will give you a URL like <code>https://cannes-proxy-xxxx.onrender.com</code></>},
          ].map(s=>(
            <div key={s.n} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              <div className="step-num">{s.n}</div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:DARK,marginBottom:3}}>{s.t}</div>
                <div style={{fontSize:12,color:MID,lineHeight:1.6}}>{s.d}</div>
              </div>
            </div>
          ))}
        </div>
      )
    },
    {
      title:"Paste your Render URL here",
      content: (
        <div>
          <p style={{fontSize:13,color:MID,lineHeight:1.6,marginBottom:14}}>
            Copy the URL Render gave you (looks like <code>https://cannes-proxy-xxxx.onrender.com</code>) and paste it below.
          </p>
          <input
            value={url}
            onChange={e=>setUrl(e.target.value)}
            placeholder="https://cannes-proxy-xxxx.onrender.com"
            style={{width:"100%",padding:"10px 14px",border:`2px solid ${url?MAPLE:BORDER}`,borderRadius:8,fontSize:13,outline:"none",marginBottom:10}}
          />
          <p style={{fontSize:11,color:MID}}>⚠️ Free Render instances sleep after 15 min of inactivity — first refresh may take ~30 seconds to wake up.</p>
        </div>
      )
    }
  ];

  return (
    <div className="modal-overlay fade-in" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box slide-in">
        {/* Modal Header */}
        <div style={{background:DARK,padding:"18px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Leaf size={18}/>
            <div>
              <div style={{color:"#fff",fontWeight:800,fontSize:15}}>🔌 Connect Live Refresh</div>
              <div style={{color:"#888",fontSize:11,marginTop:2}}>Step {step} of {steps.length}</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#888",fontSize:20,padding:4}}>✕</button>
        </div>

        {/* Step indicator */}
        <div style={{display:"flex",gap:0,borderBottom:`1px solid ${BORDER}`}}>
          {steps.map((s,i)=>(
            <button key={i} onClick={()=>setStep(i+1)} style={{
              flex:1,padding:"10px 6px",border:"none",background:"none",
              borderBottom:`3px solid ${step===i+1?MAPLE:"transparent"}`,
              fontSize:11,fontWeight:step===i+1?700:500,
              color:step===i+1?MAPLE:MID,transition:"all 0.2s",
            }}>
              Step {i+1}
            </button>
          ))}
        </div>

        {/* Step Content */}
        <div style={{padding:"20px",maxHeight:"55vh",overflowY:"auto"}}>
          <div style={{fontSize:14,fontWeight:800,color:DARK,marginBottom:14}}>{steps[step-1].title}</div>
          {steps[step-1].content}
        </div>

        {/* Footer */}
        <div style={{padding:"14px 20px",borderTop:`1px solid ${BORDER}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
          <button
            onClick={()=>setStep(s=>Math.max(1,s-1))}
            disabled={step===1}
            style={{padding:"8px 16px",background:"none",border:`1px solid ${BORDER}`,borderRadius:8,fontSize:13,color:step===1?"#ccc":MID,fontWeight:600}}
          >← Back</button>
          <div style={{display:"flex",gap:8}}>
            {step < steps.length ? (
              <button onClick={()=>setStep(s=>s+1)} style={{padding:"8px 20px",background:MAPLE,color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700}}>
                Next →
              </button>
            ) : (
              <button
                onClick={()=>{ if(url.startsWith("http")) { onSave(url.replace(/\/$/,"")); } }}
                disabled={!url.startsWith("http")}
                style={{padding:"8px 20px",background:url.startsWith("http")?MAPLE:"#ccc",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700}}
              >
                ✅ Save & Connect
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [entries, setEntries]         = R.useState(SEED);
  const [loading, setLoading]         = R.useState(false);
  const [lastUpdated, setLastUpdated] = R.useState(null);
  const [statusFilter, setStatusFilter] = R.useState("All");
  const [catFilter, setCatFilter]     = R.useState("All");
  const [searchText, setSearchText]   = R.useState("");
  const [aiSummary, setAiSummary]     = R.useState("");
  const [summaryLoading, setSummaryLoading] = R.useState(false);
  const [showModal, setShowModal]     = R.useState(false);
  const [proxyUrl, setProxyUrl]       = R.useState(()=>localStorage.getItem("cannes_proxy_url")||"");
  const [toast, setToast]             = R.useState("");

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""),3000); };

  const saveProxy = (url) => {
    setProxyUrl(url);
    localStorage.setItem("cannes_proxy_url", url);
    setShowModal(false);
    showToast("✅ Proxy connected! Hit Refresh to get live data.");
  };

  const refresh = async () => {
    if (!proxyUrl) { setShowModal(true); return; }
    setLoading(true); setSummaryLoading(true); setAiSummary("");

    const call = async (body) => {
      const r = await fetch(`${proxyUrl}/api/claude`, {
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
      });
      return r.json();
    };

    try {
      const data = await call({
        model:"claude-sonnet-4-6", max_tokens:1000,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:`Search for the very latest Canadian agency shortlists and wins at Cannes Lions 2026 (June 22-26 2026). Canadian agencies include: Rethink, TBWA Canada, GUT Toronto, Klick Health, Dentsu Creative Canada, LG2, Cossette, McCann Canada, No Fixed Address, Ogilvy Canada, Angry Butterfly, Courage, Publicis Canada, Edelman Canada, UM Toronto, Carat Canada, Initiative Canada, Tank Worldwide, Diamond, Panoply Media. Return ONLY a valid JSON array, no explanation, no backticks. Each item must have: {"campaign":"string","brand":"string","agency":"string","category":"string","subcategory":"one of: Glass|Innovation|Outdoor|Health|Film|Media|Design|PR|Social|Pharma|Other","status":"one of: Shortlisted|Bronze|Silver|Gold|Grand Prix"}`}]
      });
      const text = (data.content||[]).map(b=>b.text||"").join("\n");
      const m = text.match(/\[[\s\S]*\]/);
      if (m) {
        const fresh = JSON.parse(m[0]).map((e,i)=>({...e,id:3000+i}));
        setEntries(prev=>{
          const key = e=>`${e.campaign}|||${e.category}`;
          const existing = new Map(prev.map(e=>[key(e),e]));
          fresh.forEach(f=>{ existing.set(key(f), {...(existing.get(key(f))||{}), ...f}); });
          return Array.from(existing.values());
        });
        showToast(`✅ Updated! ${fresh.length} entries found.`);
      }
      setLastUpdated(new Date());
    } catch(e) { showToast("❌ Couldn't reach proxy. Check the URL in ⚙️ settings."); }
    finally { setLoading(false); }

    try {
      const sd = await call({
        model:"claude-sonnet-4-6", max_tokens:400,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:`Search news about Canada at Cannes Lions 2026 (June 22-26 2026). Write 2-3 punchy sentences on Canada's showing, standout agencies, wins so far. Be specific. Plain text only, no markdown.`}]
      });
      const st = (sd.content||[]).map(b=>b.text||"").join(" ").trim();
      if (st) setAiSummary(st);
    } catch(e){} finally { setSummaryLoading(false); }
  };

  const cats = ["All", ...Array.from(new Set(SEED.map(e=>e.sub)))];
  const statusFilters = ["All","Grand Prix","Gold","Silver","Bronze","Shortlisted"];

  const filtered = entries.filter(e=>{
    const ms = statusFilter==="All" || e.status===statusFilter;
    const mc = catFilter==="All" || e.sub===catFilter;
    const mt = !searchText || [e.campaign,e.brand,e.agency,e.category].some(s=>s.toLowerCase().includes(searchText.toLowerCase()));
    return ms && mc && mt;
  });

  const wins = entries.filter(e=>["Bronze","Silver","Gold","Grand Prix"].includes(e.status)).length;
  const golds = entries.filter(e=>["Gold","Grand Prix"].includes(e.status)).length;
  const agencySet = new Set(entries.map(e=>e.agency));
  const agCounts = {};
  entries.forEach(e=>{ agCounts[e.agency]=(agCounts[e.agency]||0)+1; });
  const topAg = Object.entries(agCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);

  return (
    <div style={{maxWidth:680,margin:"0 auto",minHeight:"100vh"}}>

      {/* Toast */}
      {toast && <div className="slide-in" style={{position:"fixed",top:16,right:16,zIndex:2000,background:DARK,color:"#fff",padding:"10px 18px",borderRadius:8,fontSize:13,fontWeight:600,boxShadow:"0 4px 24px rgba(0,0,0,0.35)",maxWidth:300}}>{toast}</div>}

      {/* Modal */}
      {showModal && <ProxyModal onClose={()=>setShowModal(false)} onSave={saveProxy} currentUrl={proxyUrl}/>}

      {/* ── Header ── */}
      <div style={{background:DARK,color:"#fff",padding:"26px 20px 22px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,right:0,bottom:0,width:160,background:"linear-gradient(135deg,transparent 40%,#D42B2B15 100%)",pointerEvents:"none"}}/>

        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <Leaf size={22}/>
              <span style={{fontSize:10,textTransform:"uppercase",letterSpacing:"0.14em",color:"#888",fontWeight:600}}>Canada at</span>
            </div>
            <div style={{fontSize:28,fontWeight:900,letterSpacing:"-0.02em",lineHeight:1.1,fontFamily:"Georgia,serif"}}>Cannes Lions 2026</div>
            <div style={{fontSize:11,color:"#777",marginTop:5}}>June 22–26 · Cannes, France · Live Tracker</div>
          </div>

          {/* Proxy / Settings button */}
          <button
            onClick={()=>setShowModal(true)}
            title="Setup live refresh"
            style={{
              padding:"8px 12px",background:proxyUrl?"#1a3a1a":"#2a1a1a",
              border:`1px solid ${proxyUrl?"#2d5a2d":"#5a2d2d"}`,
              borderRadius:8,color:proxyUrl?"#5aab5a":MAPLE,
              fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:6,flexShrink:0,
              marginTop:2,
            }}
          >
            {proxyUrl ? "🟢 Live" : "🔴 Offline"}
            <span style={{fontSize:10,opacity:0.8}}>⚙️</span>
          </button>
        </div>

        {/* AI Summary */}
        {(aiSummary || summaryLoading) && (
          <div className="slide-in" style={{marginTop:14,padding:"11px 14px",background:"#1C1C1C",borderRadius:8,borderLeft:`3px solid ${MAPLE}`,fontSize:13,color:"#CCC",lineHeight:1.65}}>
            {summaryLoading ? <span className="pulsing" style={{color:"#555"}}>🔍 Fetching latest from Cannes...</span> : aiSummary}
          </div>
        )}
      </div>

      {/* ── Stats ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,padding:"14px 14px 0"}}>
        {[
          {v:entries.length, l:"Entries",  c:DARK},
          {v:wins,           l:"Wins 🏅",  c:GOLD},
          {v:golds,          l:"Gold+",    c:MAPLE},
          {v:agencySet.size, l:"Agencies", c:BLUE},
        ].map(s=>(
          <div key={s.l} style={{background:"#fff",border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:900,color:s.c,lineHeight:1,fontFamily:"Georgia,serif"}}>{s.v}</div>
            <div style={{fontSize:9,color:MID,marginTop:4,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* ── Agency Leaderboard ── */}
      <div style={{padding:"10px 14px 0"}}>
        <div style={{background:"#fff",border:`1px solid ${BORDER}`,borderRadius:10,overflow:"hidden"}}>
          <div style={{padding:"9px 14px",borderBottom:`1px solid ${BORDER}`,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:MID}}>
            🏅 Agency Leaderboard
          </div>
          {topAg.map(([ag,ct],i)=>(
            <div key={ag} style={{display:"flex",alignItems:"center",padding:"8px 14px",gap:10,borderBottom:i<topAg.length-1?`1px solid ${BORDER}`:"none"}}>
              <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,background:i===0?GOLD:i===1?"#C0C0C0":i===2?"#A0522D":BORDER,color:i<3?"#fff":MID,fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
              <div style={{flex:1,fontSize:12,fontWeight:600,color:DARK}}>{ag}</div>
              <div style={{fontSize:12,fontWeight:700,color:i===0?GOLD:DARK,background:i===0?"#FFFBEA":"transparent",padding:"2px 8px",borderRadius:20}}>{ct}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Entries Table ── */}
      <div style={{padding:"10px 14px 28px"}}>
        <div style={{background:"#fff",border:`1px solid ${BORDER}`,borderRadius:10,overflow:"hidden"}}>

          {/* Controls row */}
          <div style={{padding:"10px 12px",borderBottom:`1px solid ${BORDER}`,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <input
              placeholder="Search campaign, agency, brand..."
              value={searchText}
              onChange={e=>setSearchText(e.target.value)}
              style={{flex:1,minWidth:120,padding:"6px 12px",border:`1px solid ${BORDER}`,borderRadius:20,fontSize:12,outline:"none",background:CREAM}}
            />
            <button
              onClick={refresh}
              disabled={loading}
              style={{padding:"6px 16px",background:loading?"#eee":MAPLE,color:loading?MID:"#fff",border:"none",borderRadius:20,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}
            >
              <span className={loading?"pulsing":""}>{loading?"Updating...":"🔄 Refresh"}</span>
            </button>
            <button
              onClick={()=>setShowModal(true)}
              style={{padding:"6px 12px",background:proxyUrl?"#f0fff0":"#fff0f0",color:proxyUrl?"#2d5a2d":MAPLE,border:`1px solid ${proxyUrl?"#b0d4b0":"#f0b0b0"}`,borderRadius:20,fontSize:11,fontWeight:700}}
            >
              {proxyUrl?"🟢 Connected":"🔴 Setup Refresh"}
            </button>
          </div>

          {/* Status filter */}
          <div style={{padding:"7px 12px",borderBottom:`1px solid ${BORDER}`,display:"flex",gap:5,flexWrap:"wrap"}}>
            {statusFilters.map(f=>(
              <button key={f} className="pill-btn" onClick={()=>setStatusFilter(f)} style={{padding:"3px 10px",borderRadius:20,border:`1px solid ${statusFilter===f?BLUE:BORDER}`,background:statusFilter===f?BLUE:"#fff",color:statusFilter===f?"#fff":MID,fontSize:10,fontWeight:600}}>{f}</button>
            ))}
          </div>

          {/* Category filter */}
          <div style={{padding:"7px 12px",borderBottom:`1px solid ${BORDER}`,display:"flex",gap:5,overflowX:"auto"}}>
            {cats.map(c=>(
              <button key={c} className="pill-btn" onClick={()=>setCatFilter(c)} style={{padding:"3px 10px",borderRadius:20,whiteSpace:"nowrap",border:`1px solid ${catFilter===c?MAPLE:BORDER}`,background:catFilter===c?MAPLE:"#fff",color:catFilter===c?"#fff":MID,fontSize:10,fontWeight:600}}>
                {c==="All"?c:`${CAT_ICONS[c]||"⭐"} ${c}`}
              </button>
            ))}
          </div>

          <div style={{padding:"6px 14px",fontSize:10,color:MID,borderBottom:`1px solid ${BORDER}`,fontWeight:600}}>
            Showing {filtered.length} of {entries.length} entries
          </div>

          {/* Entry rows */}
          {filtered.length===0
            ? <div style={{padding:"36px 20px",textAlign:"center",color:MID,fontSize:14}}>No entries found</div>
            : filtered.map(e=>{
              const sc = STATUS_CFG[e.status]||STATUS_CFG["Shortlisted"];
              return (
                <div key={e.id} className="entry-row" style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderBottom:`1px solid ${BORDER}`,background:"#fff",transition:"background 0.15s"}}>
                  <div style={{fontSize:18,width:24,textAlign:"center",flexShrink:0}}>{CAT_ICONS[e.sub]||"⭐"}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:DARK,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.campaign}</div>
                    <div style={{fontSize:11,color:MID,marginTop:1}}>{e.brand} · <span style={{color:BLUE}}>{e.agency}</span></div>
                    <div style={{fontSize:10,color:"#bbb",marginTop:1}}>{e.category}</div>
                  </div>
                  <div style={{padding:"3px 9px",borderRadius:20,background:sc.bg,color:sc.color,fontSize:10,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>{sc.label}</div>
                </div>
              );
            })
          }

          {lastUpdated && <div style={{padding:"7px 14px",fontSize:10,color:"#bbb",borderTop:`1px solid ${BORDER}`}}>Last refreshed: {lastUpdated.toLocaleTimeString()}</div>}
        </div>
      </div>

      {/* Footer */}
      <div style={{padding:"0 14px 28px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:4}}>
          <Leaf size={12}/>
          <span style={{fontSize:10,color:"#bbb"}}>Canada at Cannes Lions 2026 · Live Tracker</span>
        </div>
        <div style={{fontSize:10,color:"#ccc"}}>Data: Strategy Magazine, Media in Canada, Cannes Lions official · Awards Jun 22–26</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
